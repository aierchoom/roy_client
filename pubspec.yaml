name: secret_roy
description: A Flutter password manager prototype.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.10.1

dependencies:
  archive: ^4.0.9
  crypto: ^3.0.7
  cryptography: ^2.7.0
  file_picker: ^11.0.2
  flutter:
    sdk: flutter
  flutter_local_notifications: ^19.0.0
  flutter_markdown: ^0.7.6
  flutter_localizations:
    sdk: flutter
  flutter_secure_storage: ^10.0.0
  google_fonts: ^8.0.2
  http: ^1.2.0
  image: ^4.8.0
  intl: any
  local_auth: ^2.3.0
  mobile_scanner: ^7.2.0
  path: ^1.9.0
  path_provider: ^2.1.4
  pasteboard: ^0.5.0
  provider: ^6.1.5+1
  share_plus: ^12.0.2
  shared_preferences: ^2.0.15
  sqflite: ^2.2.0
  timezone: ^0.10.0
  sqflite_common_ffi: ^2.3.5
  uuid: ^4.5.3
  zxing2: ^0.2.4

dev_dependencies:
