name: Build Packages

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - master
    tags:
      - "v*"
  pull_request:
    branches:
      - main
      - master

permissions:
  contents: read

concurrency:
  group: build-packages-${{ github.ref }}
  cancel-in-progress: true

env:
  FLUTTER_CHANNEL: stable
  FLUTTER_VERSION: "3.38.3"

jobs:
  validate:
    name: Validate
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: ${{ env.FLUTTER_CHANNEL }}
          flutter-version: ${{ env.FLUTTER_VERSION }}
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Analyze
        run: dart analyze lib test

      - name: Style Token Check
        run: python3 tool/check_style_tokens.py

      - name: Test
        run: flutter test

  android-minimal-apk:
    name: Android Minimal APK
    needs: validate
    if: github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Java
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "17"
          cache: gradle

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: ${{ env.FLUTTER_CHANNEL }}
          flutter-version: ${{ env.FLUTTER_VERSION }}
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Build split release APKs
        run: flutter build apk --release --split-per-abi

      - name: List APK outputs
        run: ls -lh build/app/outputs/flutter-apk/*.apk

      - name: Upload Android APKs
        uses: actions/upload-artifact@v7
        with:
          name: secret-roy-android-split-apk
          path: build/app/outputs/flutter-apk/*-release.apk
          if-no-files-found: error
          retention-days: 14

  windows-portable:
    name: Windows Portable
    needs: validate
    if: github.event_name != 'pull_request'
    runs-on: windows-latest
    timeout-minutes: 45

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: ${{ env.FLUTTER_CHANNEL }}
          flutter-version: ${{ env.FLUTTER_VERSION }}
          cache: true

      - name: Enable Windows desktop
        run: flutter config --enable-windows-desktop

      - name: Install dependencies
        run: flutter pub get

      - name: Build Windows release
        run: flutter build windows --release

      - name: Package portable zip
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force artifacts
          Compress-Archive `
            -Path build\windows\x64\runner\Release\* `
            -DestinationPath artifacts\secret_roy_windows_x64.zip `
            -Force

      - name: Upload Windows package
        uses: actions/upload-artifact@v7
        with:
          name: secret-roy-windows-x64-portable
          path: artifacts/secret_roy_windows_x64.zip
          if-no-files-found: error
          retention-days: 14
