name: Build Packages

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - master
    tags:
      - "v*"
  pull_request:
    branches:
      - main
      - master

permissions:
  contents: read

concurrency:
  group: build-packages-${{ github.ref }}
  cancel-in-progress: true

env:
  FLUTTER_CHANNEL: stable
  FLUTTER_VERSION: "3.38.3"

jobs:
  validate:
    name: Validate
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: ${{ env.FLUTTER_CHANNEL }}
          flutter-version: ${{ env.FLUTTER_VERSION }}
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Analyze
        run: dart analyze lib test

      - name: Style Token Check
        run: python3 tool/check_style_tokens.py

      - name: Test with coverage
        run: flutter test --coverage

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        with:
          name: coverage-lcov
          path: coverage/lcov.info
          if-no-files-found: error
          retention-days: 14

  android-minimal-apk:
    name: Android Minimal APK
    needs: validate
    if: github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: gradle

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: ${{ env.FLUTTER_CHANNEL }}
          flutter-version: ${{ env.FLUTTER_VERSION }}
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Build split release APKs
        run: flutter build apk --release --split-per-abi

      - name: List APK outputs
        run: ls -lh build/app/outputs/flutter-apk/*.apk

      - name: Upload Android APKs
        uses: actions/upload-artifact@v4
        with:
          name: secret-roy-android-split-apk
          path: build/app/outputs/flutter-apk/*-release.apk
          if-no-files-found: error
          retention-days: 14

  integration-test:
    name: Integration Test
    needs: validate
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: ${{ env.FLUTTER_CHANNEL }}
          flutter-version: ${{ env.FLUTTER_VERSION }}
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Integration Test (Ubuntu)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y xvfb
          flutter config --enable-linux-desktop
          xvfb-run flutter test integration_test/ -d linux --reporter expanded

      - name: Integration Test (Windows)
        if: runner.os == 'Windows'
        shell: powershell
        run: |
          flutter config --enable-windows-desktop
          .\tool\run_regression.ps1 -IntegrationOnly

  windows-portable:
    name: Windows Portable
    needs: validate
    if: github.event_name != 'pull_request'
    runs-on: windows-latest
    timeout-minutes: 45

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: ${{ env.FLUTTER_CHANNEL }}
          flutter-version: ${{ env.FLUTTER_VERSION }}
          cache: true

      - name: Enable Windows desktop
        run: flutter config --enable-windows-desktop

      - name: Install dependencies
        run: flutter pub get

      - name: Build Windows release
        run: flutter build windows --release

      - name: Package portable zip
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force artifacts
          Compress-Archive `
            -Path build\windows\x64\runner\Release\* `
            -DestinationPath artifacts\secret_roy_windows_x64.zip `
            -Force

      - name: Upload Windows package
        uses: actions/upload-artifact@v4
        with:
          name: secret-roy-windows-x64-portable
          path: artifacts/secret_roy_windows_x64.zip
          if-no-files-found: error
          retention-days: 14

  release:
    name: Create Release
    needs: [android-minimal-apk, windows-portable]
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: write

    steps:
      - name: Download Android APKs
        uses: actions/download-artifact@v4
        with:
          name: secret-roy-android-split-apk
          path: artifacts/android/

      - name: Download Windows package
        uses: actions/download-artifact@v4
        with:
          name: secret-roy-windows-x64-portable
          path: artifacts/windows/

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            artifacts/android/*.apk
            artifacts/windows/*.zip
          generate_release_notes: true
